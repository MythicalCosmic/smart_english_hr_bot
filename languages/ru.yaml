    Это Smart English HR Bot - система подачи заявок на работу.
    
    Пожалуйста, выберите язык:
  returning: "👋 С возвращением, {name}!"

buttons:
  uz: "🇺🇿 O'zbekcha"
  ru: "🇷🇺 Русский"
  en: "🇬🇧 English"
  start_application: "📝 Подать заявку"
  settings: "⚙️ Настройки"
  back: "⬅️ Назад"
  skip: "⏭ Пропустить"
  confirm: "✅ Подтвердить"
  cancel: "❌ Отменить"
  refill: "🔄 Заполнить заново"
  male: "👨 Мужской"
  female: "👩 Женский"
  "yes": "✅ Да"
  "no": "❌ Нет"
  send_phone: "📱 Отправить номер телефона"
  secondary: "🎓 Среднее"  # uz / "🎓 Среднее" ru / "🎓 Secondary" en
  specialized_secondary: "📚 Специализированное среднее"  # uz / "📚 Среднее специальное" ru / "📚 Specialized Secondary" en
  incomplete_higher: "🎯 Незаконченное высшее"  # uz / "🎯 Незаконченное высшее" ru / "🎯 Incomplete Higher" en
  bachelor: "🎓 Высшее (Бакалавр)"  # uz / "🎓 Высшее (Бакалавр)" ru / "🎓 Higher (Bachelor)" en
  master: "👨‍🎓 Магистратура"  # uz / "👨‍🎓 Магистратура" ru / "👨‍🎓 Master's" en

menu:
  main: |
    📋 Главное меню
    
    Выберите одну из кнопок ниже:
  settings: |
    ⚙️ Настройки
    
    Выберите язык:
  language_changed: "✅ Язык успешно изменён!"

application:
  start: |
    📝 Подача заявки
    
    Пожалуйста, заполните следующую информацию.
    Заполните все поля корректно.
  
  first_name:
    ask: "👤 Введите ваше имя (2-50 символов):"
    invalid: "❌ Имя должно быть от 2 до 50 символов. Попробуйте снова:"
  
  last_name:
    ask: "👤 Введите вашу фамилию (2-50 символов):"
    invalid: "❌ Фамилия должна быть от 2 до 50 символов. Попробуйте снова:"
  
  birth_date:
    ask: |
      📅 Введите дату рождения
      
      Формат: ДД.ММ.ГГГГ
      Пример: 15.06.1995
    invalid: |
      ❌ Неверный формат!
      
      Формат: ДД.ММ.ГГГГ
      Пример: 15.06.1995
      
      Попробуйте снова:
  
  gender:
    ask: "👫 Выберите ваш пол:"
  
  address:
    ask: "🏠 Введите ваш адрес (5-255 символов):"
    invalid: "❌ Адрес должен быть от 5 до 255 символов. Попробуйте снова:"
  
  phone:
    ask: |
      📱 Введите номер телефона
      
      Формат: +998XXXXXXXXX
      Пример: +998901234567
      
      Или нажмите кнопку:
    invalid: |
      ❌ Неверный формат!
      
      Формат: +998XXXXXXXXX
      Пример: +998901234567
      
      Попробуйте снова:
  
  email:
    ask: |
      📧 Введите email адрес
      
      Пример: example@gmail.com
      
      Или пропустите:
    invalid: "❌ Неверный формат email! Попробуйте снова или пропустите:"
  
  is_student:
    ask: "🎓 Вы сейчас студент?"
  
  education_place:
    ask: "🏫 Введите название учебного заведения:"
    invalid: "❌ Название должно быть от 2 до 255 символов:"
  
  education_level:
    ask: "📚 Выберите уровень образования:"
  
  russian_level:
    ask: "🇷🇺 Выберите уровень русского языка:"
  
  russian_voice:
    ask: |
      🎤 Отправьте голосовое сообщение на русском
      
      Расскажите о себе кратко (30 сек - 2 мин)
    invalid: "❌ Пожалуйста, отправьте голосовое сообщение:"
  
  english_level:
    ask: "🇬🇧 Выберите уровень английского языка:"
  
  english_voice:
    ask: |
      🎤 Отправьте голосовое сообщение на английском
      
      Расскажите о себе кратко (30 сек - 2 мин)
    invalid: "❌ Пожалуйста, отправьте голосовое сообщение:"
  
  has_experience:
    ask: "💼 У вас есть опыт работы?"
  
  experience_years:
    ask: "📆 Сколько лет опыта работы? (введите число):"
    invalid: "❌ Пожалуйста, введите только число (0-25):"
  
  last_workplace:
    ask: "🏢 Введите название последнего места работы:"
    invalid: "❌ Название должно быть от 2 до 255 символов:"
  
  last_position:
    ask: "👔 Введите вашу последнюю должность:"
    invalid: "❌ Должность должна быть от 2 до 100 символов:"
  
  photo:
    ask: |
      📸 Отправьте ваше фото
      
      Пожалуйста, отправьте фото где видно ваше лицо.
    invalid: "❌ Пожалуйста, отправьте фото:"
  
  resume:
    ask: |
      📄 Отправьте файл резюме (PDF или Word)
      
      Или пропустите:
    invalid: "❌ Пожалуйста, отправьте PDF или Word файл или пропустите:"
  
  how_found:
    ask: |
      🔍 Откуда вы узнали о нас?
      
      Пример: Instagram, от друга, реклама
    invalid: "❌ Пожалуйста, напишите ответ от 2 до 255 символов:"
  
  additional_notes:
    ask: |
      📝 Дополнительная информация
      
      Вы можете написать дополнительную информацию о себе.
      Или пропустите:

  confirmation:
    header: |
      📋 Проверьте вашу заявку:
      
      ━━━━━━━━━━━━━━━━━━━━━
    personal: |
      👤 Личная информация:
      • Имя: {first_name}
      • Фамилия: {last_name}
      • Дата рождения: {birth_date}
      • Пол: {gender}
    contact: |
      📞 Контактная информация:
      • Адрес: {address}
      • Телефон: {phone}
      • Email: {email}
    education: |
      🎓 Образование:
      • Студент: {is_student}
      • Место учёбы: {education_place}
      • Уровень: {education_level}
    languages: |
      🌐 Языки:
      • Русский: {russian_level}
      • Английский: {english_level}
    experience: |
      💼 Опыт работы:
      • Опыт: {has_experience}
      • Лет: {years}
      • Последнее место: {workplace}
      • Должность: {position}
    additional: |
      📝 Дополнительно:
      • Откуда узнали: {how_found}
      • Заметки: {notes}
    footer: |
      ━━━━━━━━━━━━━━━━━━━━━
      
      ✅ Нажмите для подтверждения
      🔄 Нажмите для повторного заполнения
    
    ask: "Подтверждаете заявку?"
  
  success: |
    ✅ Ваша заявка успешно отправлена!
    
    Мы свяжемся с вами в ближайшее время.
    
    Спасибо! 🙏
  
  cancelled: |
    ❌ Заявка отменена.
    
    Для повторной подачи нажмите "Подать заявку".

help:
  text: |
    ℹ️ Помощь
    
    С помощью этого бота вы можете подать заявку на работу.
    
    📝 Команды:
    /start - Перезапустить бота
    /help - Помощь
    
    Если у вас есть вопросы или проблемы, свяжитесь с админом.
  developer: |
    
    🤖 Разработчик бота: @mythical_cosmic
    💼 Услуги разработки Telegram ботов и приложений
    
errors:
  general: "❌ Произошла ошибка. Пожалуйста, попробуйте снова."
  throttled: "⏳ Пожалуйста, не так быстро!"