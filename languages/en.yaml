application:
  start: |
    📝 Job Application
    
    Please fill in the following information.
    Complete all fields correctly.
  
  first_name:
    ask: "👤 Enter your first name (2-50 characters):"
    invalid: "❌ First name must be 2-50 characters. Try again:"
  
  last_name:
    ask: "👤 Enter your last name (2-50 characters):"
    invalid: "❌ Last name must be 2-50 characters. Try again:"
  
  birth_date:
    ask: |
      📅 Enter your date of birth
      
      Format: DD.MM.YYYY
      Example: 15.06.1995
    invalid: |
      ❌ Invalid format!
      
      Format: DD.MM.YYYY
      Example: 15.06.1995
      
      Try again:
  
  gender:
    ask: "👫 Select your gender:"
  
  address:
    ask: "🏠 Enter your address (5-255 characters):"
    invalid: "❌ Address must be 5-255 characters. Try again:"
  
  phone:
    ask: |
      📱 Enter your phone number
      
      Format: +998XXXXXXXXX
      Example: +998901234567
      
      Or press the button:
    invalid: |
      ❌ Invalid format!
      
      Format: +998XXXXXXXXX
      Example: +998901234567
      
      Try again:
  
  email:
    ask: |
      📧 Enter your email address
      
      Example: example@gmail.com
      
      Or skip:
    invalid: "❌ Invalid email format! Try again or skip:"
  
  is_student:
    ask: "🎓 Are you currently a student?"
  
  education_place:
    ask: "🏫 Enter your educational institution name:"
    invalid: "❌ Name must be 2-255 characters:"
  
  education_level:
    ask: "📚 Select your education level:"

  additional_courses:
    ask: "📚 Have you taken any additional courses?"

  additional_courses_subject:
    ask: "📝 Enter the course subject:"

  marriage_status:
    ask: "💍 Are you married?"

  children_count:
    ask: "👶 Enter the number and ages of your children:"

  russian_level:
    ask: "🇷🇺 Select your Russian language level:"
  
  russian_voice:
    ask: |
      🎤 Send a voice message in Russian

      Tell about yourself briefly (30 sec - 2 min)
    invalid: "❌ Please send a voice message:"
    too_short: "❌ Voice message is too short. Please send at least 30 seconds:"
  
  english_level:
    ask: "🇬🇧 Select your English language level:"
  
  english_voice:
    ask: |
      🎤 Send a voice message in English

      Tell about yourself briefly (30 sec - 2 min)
    invalid: "❌ Please send a voice message:"
    too_short: "❌ Voice message is too short. Please send at least 30 seconds:"
  
  has_experience:
    ask: "💼 Do you have work experience?"
  
  experience_years:
    ask: "📆 How many years of experience? (enter a number):"
    invalid: "❌ Please enter only a number (0-25):"
  
  last_workplace:
    ask: "🏢 Enter your last workplace name:"
    invalid: "❌ Name must be 2-255 characters:"
  
  last_position:
    ask: "👔 Enter your last position:"
    invalid: "❌ Position must be 2-100 characters:"
  
  photo:
    ask: |
      📸 Send your photo
      
      Please send a photo where your face is clearly visible.
    invalid: "❌ Please send a photo:"
  
  resume:
    ask: |
      📄 Send your resume file (PDF or Word)
      
      Or skip:
    invalid: "❌ Please send a PDF or Word file or skip:"
  
  how_found:
    ask: |
      🔍 How did you find out about us?
      
      Example: Instagram, friend, advertisement
    invalid: "❌ Please write an answer of 2-255 characters:"
  
  additional_notes:
    ask: |
      📝 Additional Information
      
      You can write additional information about yourself.
      Or skip:

  confirmation:
    header: |
      📋 Review your application:
      
      ━━━━━━━━━━━━━━━━━━━━━
    personal: |
      👤 Personal Information:
      • First Name: {first_name}
      • Last Name: {last_name}
      • Date of Birth: {birth_date}
      • Gender: {gender}
    contact: |
      📞 Contact Information:
      • Address: {address}
      • Phone: {phone}
      • Email: {email}
    education: |
      🎓 Education:
      • Student: {is_student}
      • Institution: {education_place}
      • Level: {education_level}
    languages: |
      🌐 Languages:
      • Russian: {russian_level}
      • English: {english_level}
    experience: |
      💼 Work Experience:
      • Experience: {has_experience}
      • Years: {years}
      • Last Workplace: {workplace}
      • Position: {position}
    additional: |
      📝 Additional:
      • How found: {how_found}
      • Notes: {notes}
    footer: |
      ━━━━━━━━━━━━━━━━━━━━━
      
      ✅ Press to confirm
      🔄 Press to refill
    
    ask: "Do you confirm your application?"
  
  success: |
    ✅ Your application has been successfully submitted!
    
    We will contact you soon.
    
    Thank you! 🙏
  
  cancelled: |
    ❌ Application cancelled.
    
    Press "Start Application" to submit again.

